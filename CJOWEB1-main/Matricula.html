        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!--PAGINA MATRICULA-->

<body>

    <header>
        <h1>Academia PowerLifting</h1>
        <nav>
            <ul>
                <li><a href="Home.HTML">Home</a></li>
                <li><a href="Sobre.HTML">Sobre</a></li>
                <li><a href="Planos.HTML">Planos</a></li>
                <li><a href="Treinos.HTML">Treinos</a></li>
                <li><a href="Unidades.HTML">Unidades</a></li>
                <li><a href="Matricula.HTML">Matricula</a></li>
                <li><a href="Contato.HTML">Contato</a></li>
            </ul>
        </nav>
    </header>

    <h1>Matricule-se Já!</h1>
    <br><br>
    <hr>

    <form action="" id="formmatricula">
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome"><i class="fas fa-user"></i> Nome Completo:</label><br>
            <input type="text" placeholder="Ex: <Nome> <Sobrenome>" id="nome" name="nome" required><br><br>

            <label for="email"><i class="fas fa-envelope"></i> Email:</label><br>
            <input type="email" placeholder="Ex: maromba@gmail.com" id="email" name="email" required><br><br>

            <label for="cpf"><i class="fa fa-address-card"></i> CPF:</label><br>
            <input type="text" placeholder="Ex: 123.456.789-00" id="cpf" name="cpf" required><br><br>

            <label for="telefone"><i class="fas fa-phone"></i> Telefone:</label><br>
            <input type="tel" placeholder="Ex: (xx) xxxx-xxxx" id="telefone" name="telefone" required><br><br>

            <label for="dataNascimento" placeholder="Ex: DD/MM/AAAA"><i class="fas fa-birthday-cake"></i> Data de Nascimento:</label><br>
            <input type="date" id="dataNascimento" name="dataNascimento" required><br><br>

            <label for="observacaoMed"><i class="fas fa-heartbeat"></i> Observações Médicas:</label><br>
            <textarea id="observacaoMed" name="observacaoMed"
                placeholder="Ex: Alergias, condições médicas especiais, etc." rows="4" cols="20"></textarea><br><br>


            <hr>


            <legend>Plano de Matrícula</legend>
            <br><br>

            <select id="plano" name="plano" required>

                <legend>Plano</legend>
                <option value=" ">--Selecione--</option>
                <option value="mensal">Mensal Black</option>
                <option value="semestral">Mensal Premium</option>
                <option value="anual">Anual Black</option>
                <option value="anual">Anual Premium</option>

            </select><br><br>

            <label for="pagamento"><i class="fas fa-credit-card"></i> Forma de Pagamento:</label><br>
            <select id="pagamento" name="pagamento" required>
                <fieldset>
                    <legend>Pagamento</legend>
                    <option value=" ">--Selecione--</option>
                    <option value="cartao">Cartão de Crédito</option>
                    <option value="boleto">Boleto Bancário</option>
                    <option value="pix">PIX</option>
                </fieldset>
                <br><br>
            </select><br><br>

            <label for="range"><i class="fas fa-dumbbell"></i> Nível do treino:</label><br><br>
            <input type="range" id="range" min="1" max="10" value="5" step="1">

            <p id="nivel"></p>

            <script src="script.js"></script>

            <br><br>


            <button type="submit" ><i class="fas fa-paper-plane"></i><a href="CJOWEB1-main/Concluiu.html">Enviar Matricula</a> </button>
        </fieldset>
    </form>
    <br><br><br><br>

    <footer>
        <p> &copy; 2026 Academia PowerLifiting - Trabalho HTML 2º Semestre</p>
    </footer>

</body>

</html>
